# Local dev infrastructure for Stignit API.
# Production uses managed Postgres (multi-region replica, PRD 7.2) + managed Redis;
# this compose file is for local/CI parity only.
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: stignit-postgres
    environment:
      POSTGRES_USER: stignit
      POSTGRES_PASSWORD: stignit_local_dev
      POSTGRES_DB: stignit
    ports:
      - '5432:5432'
    volumes:
      - stignit_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stignit -d stignit']
      interval: 5s
      timeout: 5s
      retries: 10

  # Stand-in for a read replica so replica-routing code can be exercised locally.
  # In production this is a real streaming replica; here it is a second instance.
  postgres-replica:
    image: postgis/postgis:16-3.4
    container_name: stignit-postgres-replica
    environment:
      POSTGRES_USER: stignit
      POSTGRES_PASSWORD: stignit_local_dev
      POSTGRES_DB: stignit
    ports:
      - '5433:5432'
    profiles: ['replica']

  redis:
    image: redis:7-alpine
    container_name: stignit-redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - stignit_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  stignit_pg:
  stignit_redis:
